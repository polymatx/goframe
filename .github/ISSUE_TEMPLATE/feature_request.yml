name: Feature request
description: Suggest an improvement or new capability
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: Describe the use case, not just the solution.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed API or behavior
      description: If you have a shape in mind, sketch it (code welcome).
      render: go
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
